name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint & Format ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Test ──────────────────────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo test
        run: cargo test --workspace --verbose

  # ── Build (release, per-target) ───────────────────────────────────
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            bin: ervy
          # Linux ARM64 (aarch64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            bin: ervy
          # Linux ARMv7
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            cross: true
            bin: ervy
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
            bin: ervy
          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
            bin: ervy
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            bin: ervy.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p ervy-cli
          else
            cargo build --release --target ${{ matrix.target }} -p ervy-cli
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          NAME="ervy-${{ matrix.target }}"
          mkdir -p artifacts
          # Find the binary (cross may name it differently)
          SRC=$(find target/${{ matrix.target }}/release/ -maxdepth 1 -name 'ervy*' -type f ! -name '*.d' ! -name '*.rlib' ! -name '*.dSYM' | head -1)
          if [ -z "$SRC" ]; then
            echo "ERROR: binary not found for ${{ matrix.target }}"
            ls -la target/${{ matrix.target }}/release/ 2>/dev/null || true
            exit 1
          fi
          cp "$SRC" "artifacts/${{ matrix.bin }}"
          cd artifacts
          if [[ "${{ matrix.bin }}" == *.exe ]]; then
            zip "../${NAME}.zip" "${{ matrix.bin }}"
          else
            tar czf "../${NAME}.tar.gz" "${{ matrix.bin }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ervy-${{ matrix.target }}
          path: ervy-${{ matrix.target }}.*

  # ── Release ───────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ervy-*
          merge-multiple: true

      - name: Organize release assets
        run: |
          mkdir -p release
          cp artifacts/*.tar.gz artifacts/*.zip release/ 2>/dev/null || true
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
